version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: provero_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: provero
      POSTGRES_PASSWORD: provero
      POSTGRES_DB: provero
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: provero_api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - .:/app
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
